<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sankhya · Mapa de Saúde VMO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1c8c52;--gl:#27c468;--gd:#0a2e18;
  --bg:#040905;--bg2:#060e07;--bg3:#080f09;
  --s:#0d1a0f;--s2:#122016;
  --b:rgba(28,140,82,.15);--b2:rgba(28,140,82,.38);
  --t:#e2f0e6;--t2:#6fa87a;--t3:#3a5443;
  --sv:#22c55e;--at:#f59e0b;--cr:#ef4444;--ns:#4b5a6b;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t)}

/* LOADING */
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#ld.out{opacity:0;pointer-events:none}
.ll{font-size:42px;font-weight:700;color:var(--gl);letter-spacing:-2px;margin-bottom:5px}
.ls{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:6px}
.lb-ts{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;opacity:.5;margin-bottom:32px}
.lb-bar{width:220px;height:2px;background:var(--s2);border-radius:2px;overflow:hidden}
.lb-fill{height:100%;background:var(--gl);border-radius:2px;animation:lw 1.6s ease forwards}
@keyframes lw{0%{width:0}100%{width:100%}}

/* HEADER */
header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--b);background:var(--bg2);position:relative;z-index:1000;flex-shrink:0}
.la{display:flex;align-items:center;gap:13px}
.logo{width:40px;height:40px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;box-shadow:0 0 20px rgba(28,140,82,.35)}
.ln{font-size:17px;font-weight:600;letter-spacing:-.4px}
.lsub{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-top:2px}
.lbuild{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;opacity:.45;margin-top:1px}
.hr{display:flex;align-items:center;gap:14px}

/* AUTO TOGGLE */
.auto-wrap{display:flex;align-items:center;gap:8px;cursor:default;user-select:none}
.auto-dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:all .3s}
.auto-dot.on{background:var(--gl);box-shadow:0 0 7px var(--gl);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.auto-lbl{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.04em}
.auto-cd{font-size:11px;color:var(--gl);font-family:'DM Mono',monospace;min-width:32px}
.tog-wrap{cursor:pointer}
.tog-track{width:38px;height:20px;border-radius:10px;background:var(--s2);border:1px solid var(--b);position:relative;transition:all .25s}
.tog-track.on{background:var(--gd);border-color:var(--g)}
.tog-thumb{width:14px;height:14px;border-radius:50%;background:var(--t3);position:absolute;top:2px;left:2px;transition:all .25s}
.tog-track.on .tog-thumb{transform:translateX(18px);background:var(--gl)}

/* LAST READ */
.upd-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.upd-lbl{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
#upd-val{font-size:13px;color:var(--t2);font-family:'DM Mono',monospace}

/* REFRESH BTN */
.rbtn{background:var(--g);border:none;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 0 16px rgba(28,140,82,.35)}
.rbtn:hover{background:var(--gl);transform:translateY(-1px)}
.rbtn:active{transform:translateY(0)}
.si{font-size:15px;display:inline-block}
.si.go{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* COUNTER BAR */
.cbar{height:76px;display:flex;border-bottom:1px solid var(--b);background:var(--bg2);flex-shrink:0;position:relative;z-index:1000}
.ci{flex:1;display:flex;align-items:center;gap:12px;padding:0 22px;border-right:1px solid var(--b);cursor:pointer;transition:background .15s;position:relative;overflow:hidden}
.ci:last-child{border-right:none}
.ci:hover{background:var(--s)}
.ci.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--cc);box-shadow:0 0 10px var(--cc)}
.cdot{width:12px;height:12px;border-radius:50%;background:var(--cc);box-shadow:0 0 10px var(--cc);flex-shrink:0;animation:dpulse 3s ease-in-out infinite}
@keyframes dpulse{0%,100%{box-shadow:0 0 8px var(--cc)}50%{box-shadow:0 0 16px var(--cc)}}
.clbl{font-size:13px;color:var(--t2)}
.cvals{display:flex;flex-direction:column;align-items:flex-end;margin-left:auto;gap:1px}
.cv{font-size:36px;font-weight:700;color:var(--cc);font-family:'DM Mono',monospace;line-height:1;letter-spacing:-1.5px;text-shadow:0 0 24px color-mix(in srgb,var(--cc) 40%,transparent)}
.cpct{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;color:var(--cc);opacity:.65;line-height:1}

/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 140px)}

/* SIDEBAR */
.sb{width:288px;flex-shrink:0;border-right:1px solid var(--b);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;z-index:500}
.ss{padding:14px 16px;border-bottom:1px solid var(--b);flex-shrink:0}
.stit{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-bottom:9px}
.tr{display:flex;gap:5px}
.tb{flex:1;padding:8px 5px;border-radius:7px;font-size:12px;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;font-weight:500}
.tb:hover{background:var(--s);border-color:var(--b2)}
.tb.on{background:var(--gd);border-color:var(--g);color:#4ade80;font-weight:600}
.gsel{width:100%;padding:9px 12px;border-radius:7px;background:var(--s);border:1px solid var(--b);color:var(--t);font-size:13px;font-family:inherit;outline:none;cursor:pointer;transition:border-color .15s}
.gsel:focus{border-color:var(--b2)}
.gsel option{background:var(--bg3)}
.sf{display:flex;flex-direction:column;gap:5px}
.sfb{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--b);color:var(--t2);padding:9px 12px;border-radius:7px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;text-align:left;width:100%;position:relative;overflow:hidden}
.sfb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:var(--bw,0%);background:var(--sc);opacity:.08;transition:width .4s ease;pointer-events:none}
.sfb:hover{border-color:var(--b2);background:var(--s)}
.sfb.on{border-color:var(--sc);color:var(--sc);background:color-mix(in srgb,var(--sc) 10%,transparent)}
.sfd{width:8px;height:8px;border-radius:50%;background:var(--sc);flex-shrink:0;box-shadow:0 0 5px var(--sc)}
.sfc{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;opacity:.75}
.uh{padding:10px 16px 4px;flex-shrink:0}
.uw{flex:1;overflow-y:auto;padding:4px 7px 10px}
.uw::-webkit-scrollbar{width:3px}
.uw::-webkit-scrollbar-thumb{background:var(--s2);border-radius:3px}
.ui{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.ui:hover{background:var(--s)}
.ui.hl{background:var(--s2);outline:1px solid var(--b2)}
.udot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.uname{font-size:12px;flex:1;line-height:1.3}
.ubadge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;background:var(--s2);color:var(--t3);flex-shrink:0}

/* MAP */
.ma{flex:1;position:relative;overflow:hidden}
.ma::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)/* scanline */}
#map{width:100%;height:100%}
.ma::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
.leaflet-tile{filter:brightness(.42) saturate(.25) hue-rotate(100deg)}
.leaflet-container{background:#030806}
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{background:rgba(3,8,5,.9)!important;color:var(--t3)!important;font-size:9px!important}
.leaflet-control-attribution a{color:var(--t3)!important}

/* CUSTOM MAP CONTROLS */
.ctrlbox{display:flex;flex-direction:column;gap:5px;margin:14px 0 0 14px}
.cbtn{width:32px;height:32px;background:var(--bg2);border:1px solid var(--b2);color:var(--gl);border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.cbtn:hover{background:var(--s2);color:#fff;border-color:var(--gl)}
.cbtn:active{transform:scale(.92)}
.cbtn-sep{margin-top:3px;border-top:1px solid var(--b);padding-top:5px}

/* PINS */
.pin-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:opacity .25s;transform-origin:bottom center}
.pin-wrap.dim{opacity:.1;pointer-events:none}
.pin-wrap:not(.dim):hover{filter:brightness(1.25);transform:scale(1.2) translateY(-3px)}
.pin-flag{position:relative;display:flex;align-items:center;justify-content:center;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:1.5px solid rgba(0,0,0,.4);box-shadow:0 2px 8px rgba(0,0,0,.6)}
.pin-lbl{font-weight:700;font-family:'DM Mono',monospace;color:#fff;line-height:1}
.pin-stem{width:2px;border-radius:0 0 2px 2px;margin-top:-1px;opacity:.8}
.pin-shadow{width:8px;height:3px;border-radius:50%;background:rgba(0,0,0,.4);margin-top:1px;filter:blur(1.5px)}
@keyframes critico-pulse{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.6),0 0 0 0 rgba(239,68,68,.6)}70%{box-shadow:0 2px 8px rgba(0,0,0,.6),0 0 0 8px rgba(239,68,68,0)}}
.pin-critico .pin-flag{animation:critico-pulse 1.8s ease-in-out infinite}

/* CUSTOM TOOLTIP (fixed, over everything) */
#ctt{position:fixed;z-index:99999;background:rgba(4,9,5,.97);border:1px solid rgba(28,140,82,.5);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.85);padding:15px 17px;min-width:235px;max-width:275px;max-height:calc(100vh - 20px);overflow-y:auto;display:none;color:var(--t)}
#ctt.show{display:block}
#ctt::-webkit-scrollbar{width:3px}
#ctt::-webkit-scrollbar-thumb{background:rgba(28,140,82,.3);border-radius:3px}
#ctt-close{position:absolute;top:9px;right:11px;background:none;border:none;color:var(--t3);font-size:19px;cursor:pointer;line-height:1;padding:0}
#ctt-close:hover{color:var(--gl)}
.tt-nm{font-size:13px;font-weight:600;line-height:1.35;padding-right:14px;margin-bottom:8px}
.tt-pills{display:flex;gap:5px;margin-bottom:7px}
.tt-pi{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px}
.pi-bp{background:rgba(59,130,246,.15);color:#60a5fa}
.pi-dc{background:rgba(168,85,247,.15);color:#c084fc}
.tt-row{font-size:11px;color:var(--t3);margin-bottom:3px}
.tt-row span{color:var(--t2)}
.tt-st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 9px;border-radius:5px;margin:5px 0 8px}
.tt-obs{font-size:11px;color:var(--t2);line-height:1.6;border-top:1px solid var(--b);padding-top:8px}
.tt-nobs{font-size:11px;color:var(--t3);font-style:italic;border-top:1px solid var(--b);padding-top:8px}
</style>
</head>

  </div>
  <div class="ci" style="--cc:var(--ns)" data-s="" onclick="toggleStatus('')">

    <div class="cvals"><span class="cv" id="cv-n">0</span><span class="cpct" id="cp-n">—</span></div>
  </div>
  <div class="ci" style="--cc:var(--gl);border-right:none">
    <span class="cdot"></span><span class="clbl">Total</span>
    <div class="cvals"><span class="cv" id="cv-t">0</span><span class="cpct" style="font-size:12px;font-weight:400;letter-spacing:.03em;text-transform:uppercase">unidades</span></div>
  </div>
</div>

<div class="wrap">
  <div class="sb">

      </div>
    </div>
    <div class="ss">

      <select class="gsel" id="gsel" onchange="setGrp(this.value)">

    </div>
    <div class="ss">
      <div class="stit">Status</div>

        <button class="sfb" style="--sc:var(--at)" data-s="Atenção" onclick="toggleStatus('Atenção')"><span class="sfd"></span>Atenção<span class="sfc" id="sf-a">0</span></button>
        <button class="sfb" style="--sc:var(--cr)" data-s="Crítico" onclick="toggleStatus('Crítico')"><span class="sfd"></span>Crítico<span class="sfc" id="sf-c">0</span></button>
        <button class="sfb" style="--sc:var(--ns)" data-s="" onclick="toggleStatus('')"><span class="sfd"></span>Sem status<span class="sfc" id="sf-n">0</span></button>
      </div>
    </div>
    <div class="uh"><div class="stit">Visíveis &nbsp;<span id="vis-cnt" style="color:var(--gl)">0</span></div></div>
    <div class="uw" id="ulist"></div>
  </div>
  <div class="ma">
    <div id="map"></div>
  </div>
</div>

<div id="ctt">
  <button id="ctt-close" onclick="closeTT()">×</button>
  <div id="ctt-body"></div>
</div>

// ═══════════════════════════════════════════════════════

function initMap() {
  map = L.map('map', {center:[-15,-53], zoom:4, zoomControl:false, minZoom:3, maxZoom:13});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom:19
  }).addTo(map);

  setTimeout(() => map.fitBounds(BZ_BOUNDS, {padding:[24,24]}), 200);

  // Custom controls
  const ctrl = L.control({position:'topleft'});
  ctrl.onAdd = function() {
    const d = L.DomUtil.create('div','ctrlbox');
    d.innerHTML =
      '<button class="cbtn" onclick="map.zoomIn()" title="Aproximar">+</button>' +
      '<button class="cbtn" onclick="map.zoomOut()" title="Afastar">−</button>' +
      '<button class="cbtn cbtn-sep" onclick="map.fitBounds(' + JSON.stringify(BZ_BOUNDS) + ',{padding:[24,24],animate:true})" title="Ver Brasil">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>' +

  map.on('click', () => closeTT());
  map.on('zoomend', () => {
    allU.forEach(u => { const mk=mkMap[u.nome]; if(mk) mk.setIcon(makeIcon(u)); });
  });
}

// ═══════════════════════════════════════════════════════
// MARKER ICON
// ═══════════════════════════════════════════════════════
function makeIcon(u) {
  const col = SC[u.termo] || SC[''];
  const isDC = u.tipo === 'DC';
  const isCritico = u.termo === 'Crítico';
  const baseRot = PIN_ROT[u.nome] || 0;
  // Rotation fades out as zoom increases — only needed when pins overlap
  const rotFactor = z<=4?1.0 : z<=5?0.6 : z<=6?0.2 : 0;
  const rot = Math.round(baseRot * rotFactor);

  // Size grows with zoom
  const z = map ? map.getZoom() : 4;
  const fs   = z<=4?12 : z<=5?16 : z<=6?19 : z<=7?22 : 25;
  const stem = z<=4?8  : z<=5?11 : z<=6?13 : z<=7?15 : 17;
  const totalH = fs + stem + 5;
  const showLbl = fs >= 16;

  // Pixel offset scales with zoom (less when zoomed out)
  const off = PX_OFF[u.nome] || [0,0];
  const f = z<=4?0.5 : z<=5?0.75 : z<=6?0.9 : 1.0;
  const dx = Math.round(off[0]*f);
  const dy = Math.round(off[1]*f);

  return L.divIcon({
    className: '',
    html: `<div class="pin-wrap${isCritico?' pin-critico':''}" style="width:${totalH}px;height:${totalH}px;transform-origin:bottom center;transform:rotate(${rot}deg)">
      <div class="pin-flag" style="width:${fs}px;height:${fs}px;background:${col}">
        <span class="pin-lbl" style="font-size:${Math.max(6,Math.round(fs*.32))}px;transform:rotate(${45-rot}deg)">${showLbl?(isDC?'DC':'BP'):''}</span>
      </div>
      <div class="pin-stem" style="height:${stem}px;background:${col}"></div>
      <div class="pin-shadow"></div>
    </div>`,
    iconSize: [totalH, totalH],
    iconAnchor: [Math.round(totalH/2)-dx, totalH-1-dy],
    popupAnchor: [0, -totalH],
  });
}

// ═══════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════
function fetchWithTimeout(url, ms) {
  return Promise.race([
    fetch(url, {cache:'no-store'}),
    new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

async function loadData() {
  document.getElementById('si').classList.add('go');
  const base = 'https://docs.google.com/spreadsheets/d/'+SHEET;
  const strategies = [
    async () => {
      const r = await fetchWithTimeout(base+'/gviz/tq?tqx=out:csv&gid=0&t='+Date.now(), 7000);
      const t = await r.text(); if(t.includes(',')) return t; throw new Error('bad');
    },
    async () => {
      const r = await fetchWithTimeout('https://api.allorigins.win/get?url='+encodeURIComponent(base+'/export?format=csv&gid=0')+'&t='+Date.now(), 7000);
      const j = await r.json(); if(j.contents?.includes(',')) return j.contents; throw new Error('bad');
    },
    async () => {
      const r = await fetchWithTimeout('https://corsproxy.io/?'+encodeURIComponent(base+'/export?format=csv&gid=0')+'&t='+Date.now(), 7000);
      const t = await r.text(); if(t.includes(',')) return t; throw new Error('bad');
    },
  ];

  let loaded = false;
  for (const fn of strategies) {
    try {
      const txt = await fn();
      const rows = parseCSV(txt).filter(r => {
        const nome = r[1]?.trim()||'';
        const num = r[0]?.trim()||'';
        return nome && nome !== 'Unidade' && nome !== 'Cidade' &&
               !nome.includes('<') && nome.length < 80 &&
               (nome.startsWith('BP') || nome.startsWith('Delivery')) &&
               (num === '' || !isNaN(Number(num)));
      });
      if (rows.length >= 5) {
        // Find column index by header name (robust to column reordering)
        const header = parseCSV(txt)[0] || [];
        const iNome   = header.findIndex(c => c.trim()==='Unidade');
        const iTipo   = header.findIndex(c => c.trim()==='Tipo');
        const iGrp    = header.findIndex(c => c.trim()==='GRP');
        const iTermo  = header.findIndex(c => c.trim()==='Termômetro');
        const iObs    = header.findIndex(c => c.trim()==='Comentários');
        const iCidade = header.findIndex(c => c.trim()==='Cidade');
        // Fallback to fixed indices if headers not found
        const _n = iNome>=0?iNome:1, _t=iTipo>=0?iTipo:2, _g=iGrp>=0?iGrp:3;
        const _e = iTermo>=0?iTermo:4, _o=iObs>=0?iObs:5, _c=iCidade>=0?iCidade:-1;

        allU = rows.map(r => ({
          nome:   r[_n]?.trim(),
          tipo:   r[_t]?.trim()||'BP',
          grp:    r[_g]?.trim()||'',
          termo:  r[_e]?.trim()||'',
          obs:    r[_o]?.trim()||'',
          cidade: _c>=0 ? (r[_c]?.trim()||'') : '',
        }));
        showStatus('ok');
        loaded = true;
        break;
      }
    } catch(e) { /* try next */ }
  }

  if (!loaded) showStatus('offline');
  document.getElementById('si').classList.remove('go');
  buildUI();
}

function parseCSV(txt) {
  return txt.split('\n').map(line => {
    const cells=[]; let cur='', inQ=false;
    for (const ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===',' && !inQ) { cells.push(cur); cur=''; }
      else cur+=ch;
    }
    cells.push(cur);
    return cells;
  });
}

function showStatus(type) {
  const el = document.getElementById('upd-val');
  if (!el) return;
  const now = new Date();
  const d = now.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const t = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.style.color = type==='ok' ? 'var(--gl)' : 'var(--at)';
  el.textContent = type==='ok' ? `${d} ● ${t}` : `offline ${t}`;
}

// ═══════════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════════
function buildUI() {
  // Populate GRP dropdown
  const grps = [...new Set(allU.map(u=>u.grp).filter(Boolean))].sort();
  const sel = document.getElementById('gsel');
  sel.innerHTML = '<option value="ALL">Todos os GRPs</option>';
  grps.forEach(g => { const o=document.createElement('option'); o.value=o.textContent=g; sel.appendChild(o); });
  // Create/update all markers
  createAllMarkers();
  renderAll();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function getVisible() {
  return new Set(allU.filter(u => {
    if (activeType!=='ALL' && u.tipo!==activeType) return false;
    if (activeGrp!=='ALL' && u.grp!==activeGrp) return false;
    if (activeStatus.size>0 && !activeStatus.has(u.termo)) return false;
    return true;
  }).map(u => u.nome));
}

function renderAll() {
  const vis = getVisible();
  const visArr = [...vis].map(n => allU.find(u=>u.nome===n)).filter(Boolean);
  const tot = vis.size;
  const s = visArr.filter(u=>u.termo==='Saudável').length;
  const a = visArr.filter(u=>u.termo==='Atenção').length;
  const c = visArr.filter(u=>u.termo==='Crítico').length;
  const n = visArr.filter(u=>!u.termo).length;
  const pct = v => tot>0 ? Math.round(v/tot*100)+'%' : '—';

  // Update counters
  document.getElementById('cv-s').textContent=s; document.getElementById('cp-s').textContent=pct(s);
  document.getElementById('cv-a').textContent=a; document.getElementById('cp-a').textContent=pct(a);
  document.getElementById('cv-c').textContent=c; document.getElementById('cp-c').textContent=pct(c);
  document.getElementById('cv-n').textContent=n; document.getElementById('cp-n').textContent=pct(n);
  document.getElementById('cv-t').textContent=tot;
  document.getElementById('vis-cnt').textContent=tot;
  document.getElementById('sf-s').textContent=s;
  document.getElementById('sf-a').textContent=a;
  document.getElementById('sf-c').textContent=c;
  document.getElementById('sf-n').textContent=n;

  // Progress bars on sidebar
  const pb=(sel,v)=>{ const el=document.querySelector(sel); if(el) el.style.setProperty('--bw',(tot>0?Math.round(v/tot*100):0)+'%'); };
  pb('.sfb[data-s="Saudável"]',s); pb('.sfb[data-s="Atenção"]',a);
  pb('.sfb[data-s="Crítico"]',c); pb('.sfb[data-s=""]',n);

  // Markers dim/show
  allU.forEach(u => {
    const mk = mkMap[u.nome]; if(!mk) return;
    const el = mk.getElement();
    if (el) { const w=el.querySelector('.pin-wrap'); if(w) w.classList.toggle('dim',!vis.has(u.nome)); }
  });

  // List
  const list = document.getElementById('ulist');
  list.innerHTML = '';
  visArr.forEach(u => {
    const col = SC[u.termo]||SC[''];
    const el = document.createElement('div');
    el.className = 'ui'+(hlUnit===u.nome?' hl':'');
    el.dataset.nome = u.nome;
    el.innerHTML = `<span class="udot" style="background:${col};box-shadow:0 0 5px ${col}"></span><span class="uname">${u.nome}</span><span class="ubadge">${u.tipo}</span>`;
    el.onclick = () => {
      hlUnit = hlUnit===u.nome ? null : u.nome;
      document.querySelectorAll('.ui').forEach(e=>e.classList.toggle('hl',e.dataset.nome===hlUnit));
      const geo=(u.cidade&&GEOCITY[u.cidade])?GEOCITY[u.cidade]:GEO[u.nome];
      if(geo) map.setView(geo,7,{animate:true,duration:.4});
      const mk=mkMap[u.nome];
      if(mk){ if(pinnedMk&&pinnedMk!==mk) pinnedMk._pinned=false; mk._pinned=true; pinnedMk=mk;
        const r=mk.getElement()?.getBoundingClientRect()||{left:window.innerWidth/2,top:300,width:0};
        showTT(u, r.left+r.width/2, r.top); }
    };
    list.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════════════
function createAllMarkers() {
  allU.forEach(u => {
    // Use cidade column if available, otherwise fall back to nome-based GEO
    const geo = (u.cidade && GEOCITY[u.cidade]) ? GEOCITY[u.cidade] : GEO[u.nome];
    if(!geo) return;
    if (mkMap[u.nome]) {
      mkMap[u.nome].setIcon(makeIcon(u));
      return;
    }
    const mk = L.marker(geo, {icon:makeIcon(u), zIndexOffset:u.termo==='Crítico'?200:100}).addTo(map);
    mk.on('mouseover', e => showTT(u, e.originalEvent.clientX, e.originalEvent.clientY));
    mk.on('mousemove', e => { if(!mk._pinned) showTT(u, e.originalEvent.clientX, e.originalEvent.clientY); });
    mk.on('mouseout', () => { if(!mk._pinned) hideTTTimer=setTimeout(closeTT,250); });
    mk.on('click', e => {
      L.DomEvent.stopPropagation(e);
      if (mk._pinned) { mk._pinned=false; pinnedMk=null; closeTT(); }
      else {
        if (pinnedMk&&pinnedMk!==mk) pinnedMk._pinned=false;
        mk._pinned=true; pinnedMk=mk;
        showTT(u, e.originalEvent.clientX, e.originalEvent.clientY);
        hlUnit=u.nome; document.querySelectorAll('.ui').forEach(el=>el.classList.toggle('hl',el.dataset.nome===hlUnit));
        map.setView(geo,7,{animate:true,duration:.4});
      }
    });
    mkMap[u.nome] = mk;
  });
}

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
function showTT(u, cx, cy) {
  clearTimeout(hideTTTimer);
  const col = SC[u.termo]||SC[''];
  const sl = u.termo||'Sem status';
  const city = (u.cidade && u.cidade.length>1) ? u.cidade : (CITY[u.nome]||'');
  document.getElementById('ctt-body').innerHTML = `
    <div class="tt-nm">${u.nome}</div>
    <div class="tt-pills"><span class="tt-pi ${u.tipo==='DC'?'pi-dc':'pi-bp'}">${u.tipo==='DC'?'Delivery Center':'Business Partner'}</span></div>
    <div class="tt-row">GRP: <span>${u.grp||'—'}</span></div>
    ${city?`<div class="tt-row" style="margin-bottom:5px">Cidade: <span>${city}</span></div>`:''}
    <span class="tt-st" style="background:${col}20;color:${col}">
      <span style="width:7px;height:7px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>${sl}
    </span>
    ${u.obs?`<div class="tt-obs">${u.obs}</div>`:`<div class="tt-nobs">Sem comentários.</div>`}`;
  const tt = document.getElementById('ctt');
  tt.classList.add('show');
  requestAnimationFrame(() => {
    const W=window.innerWidth, H=window.innerHeight, tw=tt.offsetWidth, th=tt.offsetHeight;
    let x=cx+16, y=cy-th-16;
    if (x+tw>W-12) x=cx-tw-16;
    if (x<8) x=8;
    if (y<8) y=cy+16;
    if (y+th>H-8) y=H-th-8;
    tt.style.left=x+'px'; tt.style.top=y+'px';
  });
}

function closeTT() {
  document.getElementById('ctt').classList.remove('show');
  if (pinnedMk) { pinnedMk._pinned=false; pinnedMk=null; }
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function toggleStatus(s) {
  if (activeStatus.has(s)) activeStatus.delete(s); else activeStatus.add(s);
  document.querySelectorAll('.ci[data-s]').forEach(el=>el.classList.toggle('on',activeStatus.has(el.dataset.s)));
  document.querySelectorAll('.sfb[data-s]').forEach(el=>el.classList.toggle('on',activeStatus.has(el.dataset.s)));
  renderAll();
}
function setType(t, btn) {
  activeType=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderAll();
}
function setGrp(v) { activeGrp=v; renderAll(); }

// ═══════════════════════════════════════════════════════
// AUTO REFRESH
// ═══════════════════════════════════════════════════════
let autoOn=false, autoTimer=null, autoCount=0;
const AUTO_SEC=300;

function toggleAuto() {
  autoOn=!autoOn;
  document.getElementById('tog-track').classList.toggle('on',autoOn);
  document.getElementById('auto-dot').classList.toggle('on',autoOn);
  if (autoOn) {
    autoCount=AUTO_SEC;
    clearInterval(autoTimer);
    autoTimer=setInterval(()=>{
      autoCount--;
      const m=Math.floor(autoCount/60), s=autoCount%60;
      document.getElementById('auto-cd').textContent = m>0?`${m}:${String(s).padStart(2,'0')}`:`${s}s`;
      if (autoCount<=0) { autoCount=AUTO_SEC; loadData(); }
    },1000);
  } else {
    clearInterval(autoTimer); autoTimer=null;
    document.getElementById('auto-cd').textContent='';
  }
}

function manualRefresh() { if(autoOn) autoCount=AUTO_SEC; loadData(); }

  },3500);
  await loadData();
  const ld=document.getElementById('ld');
  if(ld){ld.classList.add('out');setTimeout(()=>{try{ld.remove()}catch(e){}},500);}
});
